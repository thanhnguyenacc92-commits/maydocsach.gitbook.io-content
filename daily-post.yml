name: Đăng bài hàng ngày

on:
  schedule:
    - cron: '0 2 * * *'  # 9h sáng giờ Việt Nam (UTC+7)
  workflow_dispatch:       # Cho phép chạy thủ công để test

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Tìm và đăng bài hôm nay
        run: |
          TODAY=$(date +%Y-%m-%d)
          # Tìm file bài viết theo ngày trong thư mục queue
          FILE=$(find queue/ -name "${TODAY}*.md" | head -1)
          
          if [ -n "$FILE" ]; then
            # Đọc tên thư mục đích từ dòng đầu file (comment)
            # Ví dụ: dòng đầu file là: <!-- dest: may-doc-sach-kobo/ten-bai.md -->
            DEST=$(head -1 "$FILE" | grep -oP '(?<=dest: ).*(?= -->)')
            
            if [ -n "$DEST" ]; then
              cp "$FILE" "$DEST"
              git config user.email "autobot@maydocsach.gitbook.io"
              git config user.name "Auto Publisher"
              git add "$DEST"
              git commit -m "📚 Đăng bài: $DEST ($TODAY)"
              git push
              echo "✅ Đã đăng bài: $DEST"
            else
              echo "⚠️ Không tìm thấy thông tin đích trong file $FILE"
            fi
          else
            echo "📭 Không có bài nào cho ngày $TODAY"
          fi
